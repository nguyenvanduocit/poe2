# bunfig.local.toml
# Use this for local development when you want to use the sibling
# ../claude-code-vault-keeper checkout instead of the git version.
#
# Usage:
#   bun run install:local
#   bun run dev          # also runs install:local automatically

[install]
override = { "claude-code-vault-keeper" = "file:../claude-code-vault-keeper" }
