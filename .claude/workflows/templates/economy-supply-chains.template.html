<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>POE2 — Bản đồ chuỗi cung ứng kinh tế</title>
<!--
  TEMPLATE: economy-supply-chains.template.html  (data-driven)
  USE BY  : .claude/workflows/economy-scan.js — report stage đọc file này,
            thay đúng token (xuất hiện DUY NHẤT trong code, dòng `const REPORT =`)
            bằng JSON REPORT đã build, ghi ra tmp/economy-supply-chains-<DATE>.html.
            Token cần thay = ký tự sau dấu mở-comment REPORT_DATA tới chữ SAMPLE.
  RENDER  : toàn bộ DOM sinh từ object REPORT bên dưới — agent CHỈ sản xuất data,
            không hand-code HTML (tránh hallucination cấu trúc).
  MARKUP  : trong text, [patch ...] / [poe2db ...] / [suy luận] tự thành badge nguồn.
-->
<style>
  :root{
    --bg:#fbfbfa;--fg:#1c1c1c;--muted:#6b6b6b;--card:#ffffff;--border:#e5e5e5;--accent:#2563eb;--code-bg:#f4f4f5;
    --farm:#15803d;--drop:#0e7490;--craft:#7c3aed;--item:#b45309;--sink:#be185d;--buyer:#475569;
    --bottleneck:#dc2626;--bn-bg:#fef2f2;--up:#dc2626;--down:#16a34a;
    --b-patch:#1e40af;--b-db:#15803d;--b-inf:#92400e;
    --warn-bg:#fef3c7;--warn-fg:#92400e;--warn-bd:#f59e0b;--tip-bg:#dbeafe;--tip-fg:#1e40af;--tip-bd:#2563eb;
  }
  @media (prefers-color-scheme:dark){:root{
    --bg:#0f0f10;--fg:#ececed;--muted:#9a9a9d;--card:#18181a;--border:#2a2a2d;--accent:#60a5fa;--code-bg:#1c1c1f;
    --farm:#4ade80;--drop:#22d3ee;--craft:#c4b5fd;--item:#fbbf24;--sink:#f472b6;--buyer:#cbd5e1;
    --bottleneck:#f87171;--bn-bg:#2a1414;--up:#f87171;--down:#4ade80;
    --b-patch:#93c5fd;--b-db:#86efac;--b-inf:#fbbf24;
    --warn-bg:#2a210d;--warn-fg:#fbbf24;--warn-bd:#b45309;--tip-bg:#0e1d35;--tip-fg:#93c5fd;--tip-bd:#3b82f6;
  }}
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--fg);font:16px/1.7 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;}
  .layout{display:grid;grid-template-columns:230px 1fr;gap:0;max-width:1180px;margin:0 auto;}
  aside.toc{padding:32px 16px 32px 24px;border-right:1px solid var(--border);position:sticky;top:0;height:100vh;overflow-y:auto;font-size:13px;line-height:1.5;}
  aside.toc h2{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin:0 0 8px;}
  aside.toc ul{list-style:none;padding:0;margin:0 0 16px;}
  aside.toc a{display:block;padding:4px 8px;color:var(--fg);text-decoration:none;border-radius:4px;}
  aside.toc a:hover{background:var(--code-bg);}
  aside.toc a.active{color:var(--accent);background:color-mix(in srgb,var(--accent) 12%,transparent);}
  main{padding:44px 44px 96px;min-width:0;}
  h1{font-size:30px;margin:0 0 6px;line-height:1.2;}
  .abstract{color:var(--muted);font-size:16px;margin:0 0 22px;}
  h2{font-size:21px;margin:44px 0 12px;padding-top:10px;border-top:1px solid var(--border);}
  p{max-width:78ch;}
  code{background:var(--code-bg);padding:1px 5px;border-radius:4px;font:13px ui-monospace,Menlo,monospace;}
  .keyfacts{display:flex;flex-wrap:wrap;gap:10px;margin:18px 0 8px;}
  .kf{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 14px;min-width:140px;}
  .kf .n{font-size:20px;font-weight:700;} .kf .l{font-size:12px;color:var(--muted);}
  .legend{display:flex;flex-wrap:wrap;gap:8px;margin:14px 0;font-size:12.5px;}
  .legend .stage{display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;border:1px solid var(--border);background:var(--card);}
  .dot{width:11px;height:11px;border-radius:50%;flex:0 0 auto;}
  .chain-wrap{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px 16px;margin:14px 0 6px;overflow-x:auto;}
  .chain{display:flex;align-items:stretch;gap:0;min-width:min-content;}
  .node{flex:0 0 168px;border:1px solid var(--border);border-radius:8px;padding:9px 11px;background:var(--bg);display:flex;flex-direction:column;gap:3px;}
  .node .stage{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;display:flex;align-items:center;gap:5px;}
  .node .title{font-size:13.5px;font-weight:650;line-height:1.3;}
  .node .desc{font-size:11.5px;color:var(--muted);line-height:1.4;}
  .node.farm .stage{color:var(--farm);} .node.drop .stage{color:var(--drop);} .node.craft .stage{color:var(--craft);}
  .node.item .stage{color:var(--item);} .node.sink .stage{color:var(--sink);} .node.buyer .stage{color:var(--buyer);}
  .arrow{flex:0 0 26px;display:flex;align-items:center;justify-content:center;color:var(--muted);}
  .arrow svg{width:20px;height:20px;}
  .node.bottleneck{border:2px solid var(--bottleneck);background:var(--bn-bg);box-shadow:0 0 0 3px color-mix(in srgb,var(--bottleneck) 14%,transparent);}
  .pricetag{margin-top:4px;font:12px ui-monospace,Menlo,monospace;display:flex;flex-wrap:wrap;gap:4px 8px;align-items:baseline;}
  .pricetag .px{font-weight:700;} .up{color:var(--up);} .down{color:var(--down);} .stock{color:var(--muted);}
  .bn-tag{display:inline-block;margin-top:5px;font-size:10px;font-weight:700;color:#fff;background:var(--bottleneck);padding:1px 7px;border-radius:10px;width:fit-content;}
  .src{display:inline-block;font-size:9.5px;font-weight:700;padding:0 5px;border-radius:6px;vertical-align:middle;letter-spacing:.02em;}
  .src.patch{color:#fff;background:var(--b-patch);} .src.db{color:#fff;background:var(--b-db);} .src.inf{color:#fff;background:var(--b-inf);}
  @media (prefers-color-scheme:dark){.src.patch,.src.db,.src.inf{color:#0f0f10;}}
  .chain-note{font-size:13px;color:var(--muted);margin:8px 0 26px;max-width:80ch;}
  .chain-note .verdict{font-weight:650;color:var(--fg);}
  .typebadge{display:inline-block;font-size:11px;font-weight:700;color:#fff;padding:1px 9px;border-radius:11px;margin-left:8px;vertical-align:middle;}
  figure{margin:22px 0;} figure svg{width:100%;height:auto;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;}
  figcaption{font-size:12.5px;color:var(--muted);margin-top:8px;text-align:center;}
  table{border-collapse:collapse;width:100%;margin:14px 0;font-size:13.5px;}
  th,td{border:1px solid var(--border);padding:7px 10px;text-align:left;vertical-align:top;}
  th{background:var(--code-bg);font-size:12px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);}
  .callout{border-left:4px solid;padding:12px 16px;border-radius:0 8px 8px 0;margin:18px 0;font-size:14px;}
  .callout.warn{background:var(--warn-bg);color:var(--warn-fg);border-color:var(--warn-bd);}
  .callout.tip{background:var(--tip-bg);color:var(--tip-fg);border-color:var(--tip-bd);}
  .callout strong{display:block;margin-bottom:4px;font-size:11px;text-transform:uppercase;letter-spacing:.06em;}
  footer{font-size:12px;color:var(--muted);border-top:1px solid var(--border);padding:24px 0;margin-top:48px;}
  @media (max-width:820px){.layout{grid-template-columns:1fr;}aside.toc{position:static;height:auto;border-right:0;border-bottom:1px solid var(--border);}main{padding:22px;}.chain{flex-direction:column;}.node{flex:1 1 auto;}.arrow{transform:rotate(90deg);height:22px;}}
  @media print{aside.toc{display:none;}.layout{display:block;}main{padding:0;}.chain-wrap,figure,table,.callout{break-inside:avoid;}}
</style>
</head>
<body>
<div class="layout">
  <aside class="toc"><h2>Nội dung</h2><ul id="toc"></ul><h2>Metadata</h2><p id="meta-side" style="margin:0;color:var(--muted)"></p></aside>
  <main id="main"></main>
</div>
<script>
/* ===== SAMPLE — render standalone khi mở trực tiếp; workflow thay bằng data thật ===== */
const SAMPLE = {
  meta:{
    title:"POE2 Runes of Aldur — Bản đồ chuỗi cung ứng kinh tế",
    date:"SAMPLE", league:"Runes of Aldur", exPerDiv:92.8,
    abstract:"Mỗi item nóng vẽ thành chuỗi giá trị đầy đủ: farm content → raw drop → craft step → item → sink → buyer. Phân biệt bottleneck CUNG (content-gated) với áp lực CẦU.",
    keyfacts:[{n:"92.8 ex",l:"1 Divine"},{n:"SAMPLE",l:"dữ liệu mẫu"}]
  },
  chains:[
    {id:"c1",title:"Breach → Genesis Tree → Catalyst",type:"supply",
     intro:"0.5 cắt Catalyst khỏi drop quái Breach, dồn toàn bộ qua một cổng Genesis Tree.",
     nodes:[
       {stage:"farm",title:"Breach maps",desc:"Monastery hub [patch]"},
       {stage:"drop",title:"Hiveblood · Wombgift · Splinter",desc:"giết quái Breach [patch]"},
       {stage:"craft",title:"Genesis Tree",desc:"tiêu Wombgift/Hiveblood [patch]",bottleneck:true,tag:"CỔNG ĐỘC QUYỀN"},
       {stage:"item",title:"Catalyst",desc:"Reaver / Refined",price:{ex:"46.5 ex",delta:"+737% 7d",up:true,stock:"3.7k stock"}},
       {stage:"sink",title:"Quality lên jewellery/jewel",desc:"Reaver→ring/amulet [poe2db]"},
       {stage:"buyer",title:"Min-max gear",desc:"build endgame siết quality"}
     ],
     verdict:"Bottleneck cung thật. Refined tier stock 91–120, premium ~3×; cung khoá 1 cổng craft → +737%. [suy luận]"},
    {id:"c4",title:"Map drops chung → Crafting currency → BIS rare",type:"demand",
     intro:"Chuỗi cầu: currency rớt-mọi-nơi hội tụ vào sink craft BIS. Đắt vì ai cũng min-max, không vì content hẹp.",
     nodes:[
       {stage:"farm",title:"Map content chung",desc:"rớt mọi nơi [poe2db]"},
       {stage:"item",title:"Annulment · Perfect · Divine",desc:"currency = tool",price:{ex:"46–230 ex",delta:"",up:true,stock:"28.7k stock"}},
       {stage:"sink",title:"Xoá/thêm/reroll mod",desc:"mỗi orb một thao tác [poe2db]"},
       {stage:"buyer",title:"Rare BIS",desc:"MỌI build endgame"}
     ],
     table:{cols:["Currency","Sink","Nguồn"],rows:[["Annulment 46 ex","Xoá 1 mod ngẫu nhiên","rớt chung L35"],["Perfect Exalted 230 ex","Thêm mod tier cao","rớt chung L79 — không craft từ lesser"]]},
     verdict:"Áp lực cầu, KHÔNG phải bottleneck cung. Annulment stock 28,723 rất dày → giá về trung bình khi cung kịp. [suy luận]"}
  ],
  ranking:[
    {chain:"Catalyst (Breach→Genesis)",type:"supply",evidence:"Refined stock 91–120, ▲737%; khoá 1 cổng craft"},
    {chain:"Annulment / Perfect orbs",type:"demand",evidence:"stock 28,723 dày; giá lên do ai cũng craft"}
  ],
  provenance:[
    "[patch] Edge mechanic trích data/release-notes/Version_0.5.0.md",
    "[poe2db] Source & sink general currency verify từ poe2db.tw + poe2wiki.net",
    "[suy luận] Phân loại bottleneck cung/cầu là reasoning từ giá+stock+cấu trúc"
  ],
  warnings:[{title:"Độ tươi",body:"Re-fetch giá item cụ thể trước khi trade — cache có thể stale."}]
};
const REPORT = /*__REPORT_DATA__*/ SAMPLE;

/* ===== render ===== */
const STAGE_LABEL={farm:"Farm",drop:"Drop",craft:"Craft",item:"Item",sink:"Sink",buyer:"Buyer"};
const TYPES={
  supply:{label:"Bottleneck cung",color:"var(--bottleneck)"},
  shock:{label:"Sốc cung",color:"var(--item)"},
  demand:{label:"Áp lực cầu",color:"var(--buyer)"},
  ample:{label:"Cung dồi dào",color:"var(--down)"},
  stable:{label:"Ổn định",color:"var(--muted)"}
};
function esc(s){return String(s==null?"":s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));}
function mark(s){s=esc(s);
  s=s.replace(/\[(patch[^\]]*)\]/g,'<span class="src patch">$1</span>');
  s=s.replace(/\[(poe2db[^\]]*)\]/g,'<span class="src db">$1</span>');
  s=s.replace(/\[(?:suy luận|inf|inference)[^\]]*\]/g,'<span class="src inf">suy luận</span>');
  return s;}
const ARROW='<div class="arrow"><svg viewBox="0 0 20 20"><path d="M3 10h12M11 5l5 5-5 5" fill="none" stroke="currentColor" stroke-width="2"/></svg></div>';

function nodeHtml(n){
  let price="";
  if(n.price){
    const d=n.price.delta?`<span class="${n.price.up?'up':'down'}">${n.price.up?'▲':'▼'}${esc(n.price.delta)}</span>`:"";
    const st=n.price.stock?`<span class="stock">${esc(n.price.stock)}</span>`:"";
    price=`<span class="pricetag"><span class="px">${esc(n.price.ex)}</span>${d}${st}</span>`;
  }
  const bn=n.tag?`<span class="bn-tag">${esc(n.tag)}</span>`:"";
  const cls=`node ${n.stage}${n.bottleneck?" bottleneck":""}`;
  return `<div class="${cls}"><span class="stage"><span class="dot" style="background:var(--${esc(n.stage)})"></span>${STAGE_LABEL[n.stage]||esc(n.stage)}</span><span class="title">${mark(n.title)}</span><span class="desc">${mark(n.desc)}</span>${price}${bn}</div>`;
}
function tableHtml(t){
  if(!t||!t.rows)return"";
  const head=`<tr>${t.cols.map(c=>`<th>${esc(c)}</th>`).join("")}</tr>`;
  const body=t.rows.map(r=>`<tr>${r.map(c=>`<td>${mark(c)}</td>`).join("")}</tr>`).join("");
  return `<table><thead>${head}</thead><tbody>${body}</tbody></table>`;
}
function chainHtml(c){
  const flow=c.nodes.map(nodeHtml).join(ARROW);
  const ty=TYPES[c.type]||TYPES.stable;
  return `<h2 id="${esc(c.id)}">${mark(c.title)}<span class="typebadge" style="background:${ty.color}">${ty.label}</span></h2>`
    +(c.intro?`<p>${mark(c.intro)}</p>`:"")
    +`<div class="chain-wrap"><div class="chain">${flow}</div></div>`
    +tableHtml(c.table)
    +(c.verdict?`<p class="chain-note"><span class="verdict">${mark((c.verdict.split(".")[0]||"")+".")}</span> ${mark(c.verdict.slice((c.verdict.split(".")[0]||"").length+1))}</p>`:"");
}
function macroSvg(chains){
  const h=30+chains.length*46;
  let rows="";
  chains.forEach((c,i)=>{
    const y=24+i*46, ty=TYPES[c.type]||TYPES.stable, farm=(c.nodes.find(n=>n.stage==="farm")||c.nodes[0]||{}).title||c.title;
    rows+=`<rect x="10" y="${y}" width="250" height="34" rx="7" fill="none" stroke="${ty.color}" stroke-width="1.6"/>`
      +`<text x="135" y="${y+16}" text-anchor="middle" fill="var(--fg)" font-size="12">${esc(farm).slice(0,30)}</text>`
      +`<text x="135" y="${y+29}" text-anchor="middle" fill="${ty.color}" font-size="9.5" font-weight="700">${ty.label.toUpperCase()}</text>`
      +`<line x1="260" y1="${y+17}" x2="470" y2="${24+(h-48)/2}" stroke="var(--muted)" stroke-width="1.2" marker-end="url(#ar)"/>`;
  });
  return `<figure><svg viewBox="0 0 700 ${h}" role="img" aria-label="bản đồ kinh tế"><defs><marker id="ar" markerWidth="9" markerHeight="9" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="currentColor"/></marker></defs><g font-family="-apple-system,sans-serif">${rows}<rect x="470" y="${24+(h-48)/2-18}" width="210" height="56" rx="9" fill="none" stroke="var(--item)" stroke-width="1.6"/><text x="575" y="${24+(h-48)/2+2}" text-anchor="middle" fill="var(--fg)" font-size="13">Gear endgame</text><text x="575" y="${24+(h-48)/2+19}" text-anchor="middle" fill="var(--muted)" font-size="10.5">→ demand từ builds</text></g></svg><figcaption>Mỗi lane = một chuỗi content → hội tụ về gear endgame. Đỏ = bottleneck cung.</figcaption></figure>`;
}

const R=REPORT, M=R.meta;
document.title=M.title;
let html=`<h1 id="tong">${esc(M.title)}</h1><p class="abstract">${mark(M.abstract)}</p>`;
html+=`<div class="keyfacts">${(M.keyfacts||[]).map(k=>`<div class="kf"><div class="n">${esc(k.n)}</div><div class="l">${esc(k.l)}</div></div>`).join("")}</div>`;
html+=`<h2 id="map">Bản đồ kinh tế</h2><p>Các nguồn content bên trái đổ vào hệ crafting rồi hội tụ về gear endgame. Lane đỏ là nơi nghẽn cung thật.</p>${macroSvg(R.chains)}`;
html+=`<h2 id="doc">Đọc một chuỗi thế nào</h2><p>Item là một <em>node</em>, không phải chuỗi. Chuỗi đọc trái→phải:</p><div class="legend">`+
  ["farm|FARM — content cày ra raw","drop|DROP — raw rớt ra","craft|CRAFT — bước biến đổi","item|ITEM — sản phẩm (có giá)","sink|SINK — tiêu vào đâu","buyer|BUYER — ai mua cuối"]
  .map(s=>{const[k,l]=s.split("|");return `<span class="stage"><span class="dot" style="background:var(--${k})"></span>${l}</span>`;}).join("")+`</div>`+
  `<p style="font-size:13.5px"><strong>Bottleneck = cấu trúc</strong>: node mà cầu phía dưới vượt cung phía trên (giá tăng + stock mỏng tại đó). Giá cao + stock DÀY = áp lực cầu, không phải bottleneck cung.</p>`;
html+=R.chains.map(chainHtml).join("");
html+=`<h2 id="rank">Xếp hạng bottleneck — cung hẹp vs cầu cao</h2><table><thead><tr><th>Chuỗi</th><th>Loại</th><th>Bằng chứng</th></tr></thead><tbody>`+
  (R.ranking||[]).map(r=>{const ty=TYPES[r.type]||TYPES.stable;return `<tr><td>${mark(r.chain)}</td><td style="color:${ty.color};font-weight:700">${ty.label}</td><td>${mark(r.evidence)}</td></tr>`;}).join("")+`</tbody></table>`;
html+=`<h2 id="prov">Nguồn & độ tin</h2><ul style="font-size:14px;max-width:82ch">`+(R.provenance||[]).map(p=>`<li>${mark(p)}</li>`).join("")+`</ul>`;
html+=(R.warnings||[]).map(w=>`<div class="callout warn"><strong>${esc(w.title)}</strong>${mark(w.body)}</div>`).join("");
html+=`<footer>Snapshot ${esc(M.date)} · League ${esc(M.league)} · 1 Divine = ${esc(M.exPerDiv)} Exalted<br>Edges: patch notes 0.5.0 + poe2db/poe2wiki · Giá: poe2scout + poe.ninja exchange · Sinh từ /economy-scan</footer>`;
document.getElementById("main").innerHTML=html;

/* TOC */
const toc=[["tong","Tổng quan"],["map","Bản đồ kinh tế"],["doc","Đọc chuỗi thế nào"]]
  .concat(R.chains.map((c,i)=>[c.id,`${i+1} · ${c.title.split("→").pop().trim()}`]))
  .concat([["rank","Xếp hạng bottleneck"],["prov","Nguồn & độ tin"]]);
document.getElementById("toc").innerHTML=toc.map(([id,l])=>`<li><a href="#${esc(id)}">${esc(l)}</a></li>`).join("");
document.getElementById("meta-side").innerHTML=`Snapshot ${esc(M.date)}<br>League ${esc(M.league)}<br>1 div = ${esc(M.exPerDiv)} ex`;

const links=document.querySelectorAll('aside.toc a[href^="#"]');
const map=new Map([...links].map(a=>[a.getAttribute("href").slice(1),a]));
const io=new IntersectionObserver(es=>{for(const e of es)if(e.isIntersecting){links.forEach(a=>a.classList.remove("active"));map.get(e.target.id)?.classList.add("active");}},{rootMargin:"-25% 0px -65% 0px"});
document.querySelectorAll("main h1, main h2").forEach(h=>io.observe(h));
</script>
</body>
</html>
