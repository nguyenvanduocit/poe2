# Cloudflare Pages configuration — present so the reader-comments Pages Function
# (functions/api/comments.ts) receives its Workers KV binding in production.
# Build command + Git integration stay configured in the CF Pages dashboard;
# `nuxt generate` emits the static site to `.output/public`.
name = "poe2"
pages_build_output_dir = ".output/public"
compatibility_date = "2025-07-15"

# Reader comments storage. `COMMENTS_RESOLVE_SECRET` is set as an encrypted
# Pages env var (via `wrangler pages secret put`), not here.
[[kv_namespaces]]
binding = "COMMENTS"
id = "af811b03366b44019fdfc574d8968518"
